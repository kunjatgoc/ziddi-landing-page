<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="robots" content="noindex, nofollow" />

  <title>Ziddi Trader · Live Forex — Normal Font</title>
  <meta name="description" content="live MT5 account. fully automated." />
  <meta property="og:title" content="Ziddi Trader — Live Forex Algorithm" />
  <meta property="og:description" content="watch my live MT5 account." />
  <meta property="og:image" content="./assets/LOGO.jpg" />

  <link rel="icon" type="image/jpeg" href="./assets/LOGO.jpg" />
  <link rel="apple-touch-icon" href="./assets/LOGO.jpg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Normal-font variant: all font classes resolve to the platform system sans.
    // `font-serif` / `font-sans` / `font-mono` still work in markup, they just look identical now.
    const __sysFont = ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'];
    tailwind.config = {
      theme: {
        extend: {
          colors: { ink: '#0a0a0a', paper: '#e8e6e0', lime: '#d9ff00', blood: '#ff3a3a', dim: '#8a8a83' },
          fontFamily: {
            serif: __sysFont,
            sans:  __sysFont,
            mono:  __sysFont
          }
        }
      }
    }
  </script>

  <style>
    html, body { background: #0a0a0a; color: #e8e6e0; overflow-x: clip; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.91  0 0 0 0 0.90  0 0 0 0 0.87  0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      pointer-events: none; opacity: 0.6; z-index: 1; mix-blend-mode: overlay;
    }
    main, header, footer { position: relative; z-index: 2; }

    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .ticker-track { animation: ticker 16s linear infinite; will-change: transform; }

    .reveal-hidden { display: none; }
    .reveal-show { animation: slideUp .6s cubic-bezier(.2, .8, .2, 1) both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .sticker {
      transform: rotate(0.8deg);
      box-shadow: 0 20px 40px -10px rgba(217, 255, 0, 0.25), 0 0 0 2px #d9ff00;
    }

    .input-field {
      background: transparent; border: none;
      border-bottom: 2px solid rgba(232, 230, 224, 0.25); border-radius: 0;
      padding: 14px 2px 10px; transition: border-color .2s;
      font-size: 18px; color: #e8e6e0;
    }
    .input-field::placeholder { color: #5a5a54; }
    .input-field:focus { outline: none; border-bottom-color: #d9ff00; }
    .input-error { border-bottom-color: #ff3a3a !important; }

    .accent {
      display: inline-block; padding: 0 0.14em 0.02em;
      background: #d9ff00; color: #0a0a0a;
      transform: rotate(-1.2deg); transform-origin: center; white-space: nowrap;
    }
    .squiggle {
      background-image: linear-gradient(90deg, #d9ff00 0 50%, transparent 50%);
      background-size: 10px 0.22em; background-position: 0 100%;
      background-repeat: repeat-x; padding-bottom: 0.16em;
    }

    .copy-btn.copied { background: #d9ff00 !important; color: #0a0a0a !important; }

    * { -webkit-tap-highlight-color: transparent; }
    input[type=tel]::-webkit-outer-spin-button,
    input[type=tel]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .pill-hidden { opacity: 0; transform: scale(0.7); }
    .pill-reveal {
      opacity: 1; transform: scale(1);
      transition: opacity 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.7s cubic-bezier(.34,1.56,.64,1);
      animation: pillGlow 2.4s ease-in-out 0.6s infinite;
    }
    @keyframes pillGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217, 255, 0, 0); }
      50%      { box-shadow: 0 0 28px 4px rgba(217, 255, 0, 0.45); }
    }

    /* ========== Scroll animations ========== */
    /* Hero word stagger */
    .v-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px) rotate(4deg);
      transition: opacity .7s cubic-bezier(.25,.8,.25,1), transform .7s cubic-bezier(.34,1.56,.64,1);
      will-change: opacity, transform;
    }
    .v-word.in { opacity: 1; transform: translateY(0) rotate(0); }

    .v-accent-burst { animation: accentBurst 1.05s cubic-bezier(.34,1.56,.64,1) 0.5s both; }
    @keyframes accentBurst {
      0%   { transform: scale(0.3) rotate(-18deg); opacity: 0; }
      60%  { transform: scale(1.12) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(-1.2deg); opacity: 1; }
    }

    /* Section reveals — pop-scale */
    .v-pop {
      opacity: 0;
      transform: scale(0.9) translateY(36px);
      transition: opacity .7s cubic-bezier(.25,.8,.25,1), transform .85s cubic-bezier(.34,1.56,.64,1);
      will-change: transform, opacity;
    }
    .v-pop.in-view { opacity: 1; transform: scale(1) translateY(0); }

    .v-slide-l {
      opacity: 0;
      transform: translateX(-60px) rotate(-1deg);
      transition: opacity .7s ease-out, transform .8s cubic-bezier(.2,.8,.2,1);
    }
    .v-slide-l.in-view { opacity: 1; transform: translateX(0) rotate(0); }

    .v-slide-r {
      opacity: 0;
      transform: translateX(60px) rotate(1deg);
      transition: opacity .7s ease-out, transform .8s cubic-bezier(.2,.8,.2,1);
    }
    .v-slide-r.in-view { opacity: 1; transform: translateX(0) rotate(0); }

    /* Table row pop */
    .v-row-pop {
      opacity: 0;
      transform: scale(0.88) translateX(-20px);
      transition: opacity .55s ease-out, transform .6s cubic-bezier(.34,1.56,.64,1);
    }
    .v-row-pop.in-view { opacity: 1; transform: scale(1) translateX(0); }

    /* Equity line — path d-attribute animated via JS (see renderLineChart).
       The end-dot is revealed only after the line finishes rising. */
    #lineChart .chart-end-dot {
      opacity: 0; transform: scale(0.2);
      transition: opacity .45s ease, transform .5s cubic-bezier(.34,1.56,.64,1);
    }
    #lineChart.drawn .chart-end-dot { opacity: 1; transform: scale(1); }

    /* Pulse on button entrance */
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217, 255, 0, 0); }
      50%      { box-shadow: 0 0 30px 6px rgba(217, 255, 0, 0.45); }
    }
    .v-btn-glow { animation: btnGlow 1.6s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .v-word, .v-pop, .v-slide-l, .v-slide-r, .v-row-pop {
        opacity: 1; transform: none; transition: none; animation: none;
      }
      #lineChart .chart-end-dot { opacity: 1; transform: none; transition: none; }
      .v-accent-burst, .v-btn-glow { animation: none; }
      .pill-hidden, .pill-reveal { opacity: 1; transform: none; transition: none; animation: none; }
    }
  </style>
</head>

<body class="bg-ink">

  <!-- TICKER -->
  <div class="w-full bg-lime text-ink overflow-hidden border-b border-ink/20">
    <div id="ticker" class="ticker-track flex whitespace-nowrap py-2 font-mono font-semibold text-[12px] tracking-widest"></div>
  </div>

  <header class="px-5 pt-5 max-w-[480px] mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img data-bind-src="brand.logo" data-bind-alt="brand.name" class="w-14 h-14 rounded-md object-cover border border-paper/10 shadow-[0_0_20px_-8px_rgba(245,192,74,0.4)]" />
      <div class="flex flex-col min-w-0">
        <span class="font-serif italic text-[26px] text-paper leading-none truncate" data-bind="brand.name">Ziddi Trader</span>
        <span class="font-mono text-[12px] text-dim uppercase tracking-wider mt-1.5 truncate" data-bind="brand.handle">@ziditrader</span>
      </div>
    </div>
    <div class="flex items-center gap-1.5 font-mono text-[11px] uppercase tracking-widest text-paper/70 shrink-0">
      <span class="w-1.5 h-1.5 bg-blood rounded-full animate-pulse"></span>
      <span>live</span>
    </div>
  </header>

  <main class="max-w-[480px] mx-auto px-5 pb-12">

    <section id="heroSection" class="pt-10">
      <h1 class="font-serif text-paper tracking-tight">
        <span id="heroLead"  class="block text-[clamp(36px,10vw,52px)] leading-[1]" data-bind="hero.headlineLead"></span>
        <span class="block mt-2">
          <span id="heroAmount" class="accent font-serif italic font-normal text-ink text-[clamp(72px,22vw,112px)] leading-[0.95]" data-bind="hero.headlineAmount"></span>
        </span>
        <span class="block mt-3 text-[clamp(30px,8vw,42px)] leading-[1.05]">
          <span id="heroTail" data-bind="hero.headlineTail"></span>
          <span id="heroAccent" class="italic squiggle text-paper" data-bind="hero.headlineAccent"></span>
        </span>
      </h1>
    </section>

    <section class="mt-10 space-y-3">
      <div id="accountCard" class="border border-paper/15 bg-[#0d0d0d]">
        <div class="px-4 pt-5 pb-5">
          <div class="flex items-center justify-between mb-5">
            <div class="font-mono text-[10px] uppercase tracking-[0.22em] text-dim">live mt5 account</div>
            <div class="flex items-center gap-1.5">
              <span class="relative flex h-1.5 w-1.5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blood opacity-75"></span>
                <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-blood"></span>
              </span>
              <span class="font-mono text-[10px] uppercase tracking-[0.22em] text-blood">live</span>
            </div>
          </div>

          <div class="grid grid-cols-[1fr_auto_1fr] items-end gap-x-3">
            <div class="text-center">
              <div class="font-mono font-semibold text-[11px] uppercase tracking-[0.22em] text-dim mb-2">invested</div>
              <div class="font-mono text-[28px] text-paper tabular-nums font-semibold leading-none" id="accountInvested">$0</div>
            </div>
            <svg class="w-11 h-4 mb-2.5 text-lime" viewBox="0 0 44 16" fill="none" aria-hidden="true">
              <path d="M2 8 L36 8 M30 2 L40 8 L30 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="text-center">
              <div class="font-mono font-semibold text-[11px] uppercase tracking-[0.22em] text-dim mb-2">now</div>
              <div class="font-mono text-[28px] text-lime tabular-nums font-bold leading-none" id="accountCurrent">$0</div>
            </div>
          </div>

          <div id="accountProfitBadge" class="mt-5 grid grid-cols-3 border border-lime/40 bg-lime/10"></div>
          <div id="accountTags" class="mt-4 grid grid-cols-2 gap-2"></div>
        </div>

        <div class="px-4 py-3 border-t border-paper/10 font-mono text-[11px] uppercase tracking-[0.18em] text-dim" id="accountPeriod">—</div>

        <div class="px-4 pt-3 pb-4 border-t border-paper/10">
          <div class="mb-3 font-mono text-[12px] text-paper font-bold">weekly profit ($)</div>
          <div id="lineChart" class="relative w-full h-40"></div>
        </div>
      </div>

      <div id="weeklyPulseCard" class="border border-paper/15 bg-[#0d0d0d]">
        <div class="px-4 py-3 font-mono text-[11px] uppercase tracking-[0.18em] text-lime font-bold">weekly pulse</div>
        <table class="w-full table-fixed">
          <colgroup><col style="width:50%" /><col style="width:25%" /><col style="width:25%" /></colgroup>
          <thead>
            <tr class="font-mono text-[10px] uppercase tracking-widest text-dim border-t border-b border-paper/10">
              <th class="text-left px-4 py-2.5 font-normal">week range</th>
              <th class="text-right pl-4 pr-8 py-2.5 font-normal">profit</th>
              <th class="text-right pl-4 pr-8 py-2.5 font-normal">roi</th>
            </tr>
          </thead>
          <tbody id="weekTableBody" class="font-mono text-[12px] tabular-nums"></tbody>
          <tfoot id="weekTableFoot" class="font-mono text-[12px] tabular-nums font-bold"></tfoot>
        </table>
      </div>
    </section>

    <div class="mt-12 border-t border-paper/10"></div>

    <section id="formSection" class="mt-14">
      <div class="relative border border-paper/15 bg-gradient-to-b from-[#141414] to-[#0a0a0a] p-6 shadow-[0_30px_80px_-30px_rgba(217,255,0,0.28)]">

        <!-- Lime corner brackets for visual anchor -->
        <span class="pointer-events-none absolute top-0 right-0 w-5 h-5 border-t-2 border-r-2 border-lime/70"></span>
        <span class="pointer-events-none absolute bottom-0 left-0 w-5 h-5 border-b-2 border-l-2 border-lime/40"></span>

        <div class="mb-6">
          <div class="inline-flex items-center gap-3 mb-4">
            <img src="./assets/mt5-icon.png" alt="" class="h-11 w-11" />
            <span class="font-sans font-semibold text-paper text-[20px] tracking-tight leading-none">
              MetaTrader<span class="text-lime font-bold"> 5</span>
            </span>
          </div>
          <h2 class="font-serif italic text-paper text-4xl leading-none" data-bind="form.title">drop your name.</h2>
          <p class="mt-2 text-dim text-[16px] leading-relaxed" data-bind="form.subtitle"></p>
        </div>

        <!-- Divider between heading block and form -->
        <div class="-mx-6 border-t border-paper/10 mb-6"></div>

        <form id="leadForm" novalidate>
          <div id="formFields" class="space-y-6"></div>
          <button type="submit" id="submitBtn" class="mt-8 w-full bg-lime text-ink font-bold py-5 text-[13px] uppercase tracking-[0.18em] hover:bg-lime/90 active:scale-[0.99] transition-all flex items-center justify-center gap-2 border-2 border-lime">
            <span id="submitLabel">GET MT5 LOGIN</span>
            <svg id="submitArrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            <svg id="submitSpinner" class="hidden animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
          </button>
          <p id="formError" class="hidden mt-3 text-[14px] text-blood font-mono"></p>
          <p class="mt-4 text-dim text-[12px] font-mono leading-relaxed" data-bind="form.privacyNote"></p>
        </form>
      </div>
    </section>

    <section id="revealSection" class="reveal-hidden mt-14">
      <div class="sticker bg-ink border-2 border-lime p-6 relative">
        <div class="absolute -top-3 left-6 bg-lime text-ink font-mono text-[11px] font-bold uppercase tracking-widest px-2.5 py-1" data-bind="reveal.badge">LIVE ACCOUNT</div>
        <h3 class="font-serif italic text-paper text-4xl leading-none mt-2" data-bind="reveal.title">here you go.</h3>
        <p class="mt-2 text-dim text-[14px] leading-relaxed" data-bind="reveal.subtitle"></p>
        <div id="credentialsList" class="mt-6 space-y-0 divide-y divide-paper/10 border-y border-paper/10"></div>
        <p class="mt-5 text-dim text-[12px] font-mono leading-relaxed" data-bind="reveal.note"></p>
      </div>
    </section>

    <section id="upsellSection" class="reveal-hidden mt-10">
      <div class="border border-paper/15 p-6">
        <h3 class="font-serif text-paper text-3xl leading-tight" data-bind-html="upsell.headline"></h3>
        <p class="mt-2 text-dim text-[15px] leading-relaxed" data-bind="upsell.subheadline"></p>
        <ul id="upsellFeatures" class="mt-5 space-y-2.5"></ul>
        <a id="upsellBtn" target="_blank" rel="noopener" class="mt-6 w-full bg-paper text-ink font-bold py-5 text-[13px] uppercase tracking-[0.18em] hover:bg-lime active:scale-[0.99] transition-all flex items-center justify-center gap-2">
          <span data-bind="upsell.buttonText">GET THE ALGO</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </section>

    <section id="finalCtaSection" class="mt-16 pt-10 pb-2 border-t border-paper/10 text-center">
      <h3 class="font-serif italic text-paper text-[clamp(28px,7vw,36px)] leading-[1.1]" data-bind="finalCta.headline">—</h3>
      <p class="mt-3 text-dim text-[15px] leading-relaxed max-w-[34ch] mx-auto" data-bind="finalCta.subheadline">—</p>
      <a id="finalCtaBtn" target="_blank" rel="noopener" class="mt-7 inline-flex w-full items-center justify-center gap-2 bg-lime text-ink font-bold py-5 px-6 text-[13px] uppercase tracking-[0.18em] hover:bg-lime/90 active:scale-[0.99] transition-all border-2 border-lime">
        <span data-bind="finalCta.buttonText">DEPLOY</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </section>

  </main>

  <footer id="siteFooter" class="max-w-[480px] mx-auto px-5 pb-8 pt-4 mt-8">
    <p class="font-mono text-[11px] text-dim/60 mt-3" data-bind="footer.copyright"></p>
  </footer>

  <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-6 bg-lime text-ink font-mono text-[12px] font-bold uppercase tracking-widest px-4 py-2.5 opacity-0 pointer-events-none transition-opacity z-50">copied</div>

  <script src="./app.js"></script>
</body>
</html>
